services:
  postgres:
    image: postgres:17
    container_name: ai_auth
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: ai_auth
    ports:
      - "65432:5432"

  redis:
    image: redis:8.6.0
    container_name: ai_redis
    ports:
      - "6379:6379"

  redis-insight:
    image: redis/redisinsight:3.0.3
    container_name: redis_insight
    ports:
      - "5540:5540"
    depends_on:
      - redis
    volumes:
      - redisinsight_data:/data

volumes:
  redisinsight_data:
