<main class="flex min-h-screen flex-col items-center justify-center gap-6 bg-background px-6 text-center">
    <img ngSrc="/img/not-found.svg" width="500" height="500" priority class="w-56 md:w-64 h-auto mb-2 md:mb-4" alt="Página não encontrada" />

    <div class="flex flex-col gap-2">
        <h1 class="font-title text-2xl md:text-3xl lg:text-4xl font-bold tracking-tight text-primary mb-1 md:mb-2">
            Página não encontrada
        </h1>
        <p class="max-w-md text-sm lg:text-base font-semibold text-muted-foreground">
            O endereço acessado não existe ou foi movido. Volte para a página inicial e continue de onde parou.
        </p>
    </div>

    <a ai-button variant="default" icon="arrow-right" shape="circle" routerLink="/">Voltar ao início</a>
</main>
